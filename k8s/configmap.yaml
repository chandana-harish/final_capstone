apiVersion: v1
kind: ConfigMap
metadata:
  name: pipelineiq-config
  namespace: pipelineiq
data:
  NODE_ENV: "production"
  FRONTEND_URL: "https://pipelineiq.example.com"
  PUBLIC_API_BASE_URL: "https://pipelineiq.example.com"
  AUTH_SERVICE_URL: "http://auth-service:8081"
  DASHBOARD_API_URL: "http://dashboard-api:8080"
  GITHUB_SERVICE_URL: "http://github-integration-service:8082"
  PIPELINE_RUNNER_URL: "http://pipeline-runner-service:8083"
  ANALYZER_SERVICE_URL: "http://workflow-analyzer-service:8084"
  GEMINI_SERVICE_URL: "http://gemini-ai-service:8085"
  NOTIFICATION_SERVICE_URL: "http://notification-service:8086"
  GITHUB_CALLBACK_URL: "https://pipelineiq.example.com/api/auth/github/callback"
  GEMINI_MODEL: "gemini-1.5-pro"
  RABBITMQ_URL: "amqp://rabbitmq:5672"
  SMTP_PORT: "587"

