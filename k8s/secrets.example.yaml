apiVersion: v1
kind: Secret
metadata:
  name: pipelineiq-secrets
  namespace: pipelineiq
type: Opaque
stringData:
  GITHUB_CLIENT_ID: "replace-me"
  GITHUB_CLIENT_SECRET: "replace-me"
  GITHUB_WEBHOOK_SECRET: "replace-me"
  JWT_SECRET: "replace-me"
  TOKEN_ENCRYPTION_KEY: "replace-me"
