apiVersion: v1
kind: Secret
metadata:
  name: pipelineiq-secrets
  namespace: pipelineiq
type: Opaque
stringData:
  GITHUB_CLIENT_ID: "replace-me"
  GITHUB_CLIENT_SECRET: "replace-me"
  GITHUB_WEBHOOK_SECRET: "replace-me"
  JWT_SECRET: "replace-with-long-random-value"
  TOKEN_ENCRYPTION_KEY: "replace-with-32-byte-base64-key"
  DATABASE_URL: "postgresql://pipelineiq:password@your-azure-postgres-host:5432/pipelineiq"
  GEMINI_API_KEY: "replace-me"
  SMTP_HOST: ""
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  SMTP_FROM: "PipelineIQ <no-reply@example.com>"

